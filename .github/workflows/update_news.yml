name: Daily News, Crypto, and Anomaly Dashboard Update

on:
  schedule:
    - cron: '0 * * * *' # Berjalan tiap 1 jam
  workflow_dispatch: # Memungkinkan kamu menjalankan manual dari tab Actions

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pandas matplotlib beautifulsoup4 requests lxml plotly

      - name: Run News Scraper
        run: python scripts/scrapper.py

      - name: Run Crypto Analyzer
        run: python scripts/crypto_analyzer.py

      - name: Run Anomaly Detection & Dashboard (Project 4)
        run: |
          python main.py
          python visualizer.py

      - name: Commit and Push All Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Ambil update terbaru untuk menghindari konflik
          git pull origin main --rebase
          
          # Tambahkan semua file hasil generate (Berita, Crypto, dan Dashboard)
          git add tren_berita.png top_keyword.txt crypto_trend.png crypto_status.txt dashboard.html market_transactions.csv
          
          # Commit hanya jika ada perubahan
          git commit -m "Automated update: News, Crypto, and Anomaly Dashboard [skip ci]" || echo "No changes to commit"
          
          # Push hasil update
          git push origin main
