- name: Install dependencies
  run: |
    pip install pandas matplotlib beautifulsoup4 requests lxml plotly
- name: Run Data Pipeline (Project 1, 3, 4)
  run: |
    cd scripts
    python main.py
- name: Update Dashboard HTML (Project 4)
  run: |
    # Jalankan visualizer yang ada di root
    python visualizer.py
- name: Commit and Push All Changes
  run: |
    git config --local user.email "github-actions[bot]@users.noreply.github.com"
    git config --local user.name "github-actions[bot]"
    git pull origin main --rebase
    git add .
    git commit -m "Automated Data Update: All Projects [skip ci]" || echo "No changes"
    git push origin main
