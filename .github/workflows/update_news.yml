name: Daily News, Crypto, and Anomaly Update

on:
  schedule:
    - cron: '0 * * * *' # Berjalan setiap jam
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pandas matplotlib beautifulsoup4 requests lxml plotly yfinance

      - name: Run Full Pipeline
        run: |
          # Jalankan pengolahan data
          cd scripts
          python main.py
          # Jalankan visualizer dari root
          cd ..
          python visualizer.py

      - name: Commit and Push All Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Tambahkan semua file baru
          git add .
          
          # Commit hasil kerja bot
          git commit -m "Automated Data Update: All Projects [skip ci]" || echo "No changes to commit"
          
          # Tarik data terbaru dari server dengan rebase
          git pull origin main --rebase
          
          # Push hasil akhir
          git push origin main
